{% extends "blog/base.html" %}
{% block content %}
<div class="content-section">
    <h1>{{post.title}}</h1>
    <div class="mb-3">
        <p>Are you sure  want to delete?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-sm btn-danger">Yes, delete</button>
            <a href="{% url 'blog:home' %}" class="btn btn-sm btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
