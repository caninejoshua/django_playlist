{% extends "blog/base.html" %}
{% block content %}
<div class="content-section">
    <h1>{{post.title}}</h1>
    <p>{{post.artist}}</p>
    <hr>
    <small>{{post.created_by}}</small>
    <div class="btn-group">
        <a href="{% url 'blog:post-update' post.pk%}" class="btn btn-sm btn-outline-secondary ms-2">Update</a>
        <a href="{% url 'blog:post-delete' post.pk%}" class="btn btn-sm btn-outline-danger ms-2">Delete</a>
        <a href="{% url 'blog:home'%}" class="btn btn-sm btn-outline-secondary ms-2">Return</a>
    </div>
</div>
{% endblock %}
